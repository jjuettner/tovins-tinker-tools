<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        // GitHub Pages SPA fallback:
        // /<repo>/join?x=y  -> /<repo>/#/join?x=y
        var path = window.location.pathname || "/";
        var search = window.location.search || "";

        // Guess base as "/<repo>/" when hosted as project page.
        var parts = path.split("/").filter(Boolean);
        var base = parts.length > 0 ? "/" + parts[0] + "/" : "/";

        // Remove base prefix from path to get client route.
        var rest = path.indexOf(base) === 0 ? path.slice(base.length - 1) : path;

        // If already has hash router, do nothing.
        if (window.location.hash && window.location.hash.length > 1) return;

        var target = base + "#" + rest + search;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    Redirecting…
  </body>
</html>
